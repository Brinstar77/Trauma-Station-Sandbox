- type: entity
  parent: [ ClothingNeckBase, BaseRevMajorContraband ]
  id: ClothingRevolutionaryIFF
  name: Revolutionary IFF Card
  description: Shows constructed turrets that you are a friend.
  components:
  - type: Item
    size: Tiny
  - type: Sprite
    sprite: _Trauma/Clothing/Neck/revIFF.rsi
  - type: Clothing
    sprite: _Trauma/Clothing/Neck/revIFF.rsi
  - type: FactionClothing
    faction: Revolutionary

- type: entity
  parent: ClothingNeckUnbutcherableBase
  id: ClothingNeckBombCollarBroken
  name: disabled bomb collar
  description: A disabled bomb collar, it will no longer explode, but it will give away your criminal history.
  components:
  - type: Item
    size: Tiny
  - type: Sprite
    sprite: _Trauma/Clothing/Neck/bombcollar.rsi
  - type: Clothing
    sprite: _Trauma/Clothing/Neck/bombcollar.rsi
  - type: SelfUnremovableClothing

- type: entity
  parent: ClothingNeckUnbutcherableBase
  id: ClothingNeckShockCollar
  name: shock collar
  description: An electrified collar that delivers a weak shock on the signal. A label is visible on the back; "for NT-approved usage only".
  components:
  - type: Item
    size: Tiny
  - type: Sprite
    sprite: _Trauma/Clothing/Neck/bombcollar.rsi
  - type: Clothing
    sprite: _Trauma/Clothing/Neck/bombcollar.rsi
  - type: SelfUnremovableClothing
  - type: ShockOnTrigger # Shock is far less damaging than Electropack.
    targetContainer: true
    damage: 1
    duration: 2
  - type: TriggerOnSignal
  - type: DeviceLinkSink
    ports:
      - Trigger
